name: secure_chat
description: SecureChat - A production-ready chat application
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.3.3
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # File Handling
  image_picker: ^1.0.4
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  
  # Media
  video_player: ^2.7.2
  audioplayers: ^5.2.1
  chewie: ^1.7.4
  
  # UI Components
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  flutter_sound: ^9.2.13
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  mime: ^1.0.4
  http_parser: ^4.0.2
  
  # Security
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
